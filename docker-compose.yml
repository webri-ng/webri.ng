services:
  database:
    # PostgreSQL 14 is used in production.
    image: postgres:14
    environment:
      - POSTGRES_USER=webmaster
      - POSTGRES_PASSWORD=pw
      - POSTGRES_DB=webring_dev
    ports:
      - '54327:5432'
  smtp4dev:
    image: rnwood/smtp4dev:v3
    restart: always
    ports:
      - '5000:80'    # Web interface.
      - '3725:25'    # SMTP server.
      - '1437:143'   # IMAP server.
    volumes:
        - smtp4dev-data:/smtp4dev
    environment:
      - ServerOptions__HostName=smtp4dev

volumes:
  smtp4dev-data:
